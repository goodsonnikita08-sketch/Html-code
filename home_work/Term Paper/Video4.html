<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Video</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="resurs/Youtube_icon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="header-block border-bottom">
      <div class="container-fluid py-2">
        <div
          class="d-flex align-items-center justify-content-between gap-3 flex-wrap"
        >
          <div class="d-flex align-items-center gap-3">
            <button class="btn menu-btn">☰</button>

            <a
              href="Home.html"
              class="d-flex align-items-center gap-2 text-decoration-none logo-link"
            >
              <img
                src="resurs/Youtube_logo.png"
                alt="logo"
                class="youtube-logo-img"
              />
              <span class="fw-bold fs-4 logo-text">YouTube</span>
            </a>
          </div>

          <form
            class="search-form d-flex align-items-center justify-content-center flex-grow-1"
            action="Video4.html"
          >
            <div class="input-group search-group">
              <input
                type="text"
                class="form-control search-input"
                placeholder="Введите запрос"
              />
              <button class="btn search-btn">🔍</button>
            </div>
          </form>

          <div class="d-flex align-items-center gap-2">
            <button class="btn icon-btn">🎤</button>
            <button class="btn icon-btn">＋</button>
            <button class="btn icon-btn">🔔</button>
            <a href="Profile.html" class="profile-circle text-decoration-none"
              >H</a
            >
          </div>
        </div>
      </div>
    </header>

    <div class="container-fluid py-3">
      <div class="row g-4">
        <main class="col-12 col-xl-8">
          <div class="video-player-block rounded-4 overflow-hidden mb-3">
            <iframe
              class="main-video-frame"
              src="https://www.youtube.com/embed/LAz8VGOJYWw"
              allowfullscreen
            >
            </iframe>
          </div>

          <div class="main-video-title mb-3">
            Head To Head With Lyrics (Animation Collab With @limitless6473)
          </div>

          <div
            class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3 mb-3"
          >
            <div class="d-flex align-items-center gap-3">
              <div class="channel-avatar-big bg-dark">A</div>

              <div>
                <div class="video-page-channel-name">after stick node</div>
                <div class="video-page-channel-meta">11,5 тыс. подписчиков</div>
              </div>

              <button class="btn video-subscribe-btn">Подписаться</button>
            </div>

            <div class="d-flex flex-wrap gap-2">
              <button class="btn video-action-btn">👍 3,2 тыс.</button>
              <button class="btn video-action-btn">👎</button>
              <button class="btn video-action-btn">↗ Поделиться</button>
              <button class="btn video-action-btn">⬇ Скачать</button>
            </div>
          </div>

          <div class="video-description-block rounded-4 p-3 mb-4">
            <div class="description-top mb-2">
              193 063 просмотра • 23 сент. 2025 г.
            </div>

            <div class="description-text">
              Анимационный коллаб с текстом песни. Очень качественная работа.
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
