<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Card Game</title>

    </svg>'>
    <Style>
        .cardslot {
            width: 100px;
            height: 150px;
            border: 3px solid black;
            border-radius: 15px;
            margin: 20px;
            display: inline-block;
            background-color: #e7dde1;
        }


        .Number {
            font-size: 46px;
            color: rgb(0, 0, 0);
            text-align: center;
            margin-top: 50px;
            margin-left: 37px;
            

        }
        
        .Suit {
            font-size: 30px;
            color: rgb(0, 0, 0);
            text-align: left top ;
            margin-top: 2px;
            
            

        }
    </Style>
</head>

<body>
    <h1 style="padding-left: 1.7em; padding-top: 1.2em;">Player 1</h1>
    <div class="cardslot">

    </div>
    <div class="cardslot">

    </div>

    </div>

    </div>
    <div class="cardslot">

    </div>
    <div class="cardslot">

    <h1 style="padding-left: 1.7em; padding-top: 2em;">Player 2</h1>

    </div>
    <div class="cardslot">
        <h2 class="Suit">♣️</h2>

    </div>
    <div class="cardslot">
        <h2 class="Suit">♣️</h2>

</html>
