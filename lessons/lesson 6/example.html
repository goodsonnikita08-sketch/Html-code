<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>

        table {
            width: 80%;
            min-width: 650px;
            max-width: 800px;

            margin: 0 auto;

            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif;
        }
        caption {
            text-align: right;
            text-transform: uppercase;
            color: rgb(148, 148, 148);
            font-weight: 700;
        }

        th {
            text-transform: uppercase;
            color: white;
        }
        th, td {
            text-align: center;
            padding: 1em 0;
        }

        tr td:first-child {
            text-align: left;
            color: gray;
            padding: 0.7em;
        }

        .col-1 {
            background-color: #ddd;
            width: auto;
        }

        .col-2 {
           background-color: #17d0d3 ;
           width: 17%;
        }
        
        .col-3 {
            background-color: #8ac149;
            width: 17%;
        }

        .col-4 {
            background-color: #feca28;
            width: 17%;
        }

        .col-5 {
            background-color: #f44236;
            width: 17%;
        }

        span {
            
        }

    </Style>
</head>
