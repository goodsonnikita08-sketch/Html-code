<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: black;
        }

        img {
            width: calc(17%);
            box-shadow: 2px 2px 15px black;
        }

        .container {
            background-color: aquamarine;
            border: cadetblue;
            border-radius: 15px;
            margin: 2em;
            padding: 1.5em;
            height: 300px;

            display: flex;
            flex-direction: row;

            /* gap: 4em; */

            flex-wrap: wrap;

            justify-content: space-around;
            align-items: center;
        }

        .flex-elem {
            /* width: 150px; */
            flex-basis: 100px;
            height: 150px;

            display: flex;
            justify-content: center;
            align-items: center;

            border-radius: 10px;
        }

        .elem1 {
            /* flex-shrink: 1; */
            background-color: green;
            /* order: 3; */
        }

        .elem2 {
            /* flex-shrink: 2; */
            background-color: blue;
            align-self: flex-start;
            /* order: 4; */
        }

        .elem3 {
            /* flex-shrink: 2; */
            background-color: yellow;
            /* order: 2; */
        }

        .elem4 {
            /* flex-shrink: 1; */
            background-color: red;
            /* order: 1; */
        }
    </Style>
</head>
<body>

    <div class="container">
        <div class="flex-elem elem1">1</div>
        <div class="flex-elem elem2">2</div>
        <div class="flex-elem elem3">3</div>
        <div class="flex-elem elem4">4</div>
        <!-- <img src="../../shared_resoursers/sans.png" alt="pic1">
        <img src="../../shared_resoursers/sans.png" alt="pic1">
        <img src="../../shared_resoursers/sans.png" alt="pic1"> -->
    </div>
    
</body>
</html>
