<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box sizing</title>
    <link rel="icon" href="../../shared_resoursers/dtek_style_icon_transparent.png">
    <Style>
        .demo{
            width: 200px;
            height: 60px;
            border: solid black 5px;
            margin: 10px;
            padding: 20px;

            text-align: center;
        }
        .border-box{
        box-sizing: border-box;
        }
    </Style>
</head>
<body>
    <div class="demo border-box">
       some text
    </div>
    <div class="demo">
        some text
    </div>
</body>
</html>
