<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    <link rel="icon" href="../../shared_resoursers/dtek_style_icon_transparent.png">
    <Style>
        body {
            margin: 0;
            padding: 0;

        }

        h2,p {
            margin: 10px;

        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
        }

        ul li {
            float: left;
        }

        ul li a {
            display: block;
            color: wheat;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        ul li a:hover {
            background-color: #111;
        }
    </Style>
</head>
<body>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#about">About</a></li>    
    </ul>

    <h2>Horizontal NavBar</h2>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Amet, consequatur!</p>
    
</body>
</html>
