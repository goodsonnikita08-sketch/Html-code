<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        * {
            margin: 0;
            padding: 0;
        }

       
        .container {
            margin: 1.1em auto;
            padding: 0.6em;
            box-sizing: border-box;
            min-height: 100vh;
            max-width: 100vw;

            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            grid-template-rows: 10vh 1fr 5vh;
            grid-template-areas: 
            'header header header'
            'menu main right'
            'footer footer footer';
        }
        .container div {
            background-color: beige;
            border: cadetblue;
        }


        .menu {
            grid-area: menu;
        }

        .main {
            grid-area: main;
        }

        :right {
            grid-area: right;
        }

        .footer {
            grid-area: footer;
        }
        header {
            grid-area: header;
            display: flex;
            align-items: center;
            gap: 0.4em;

            padding-left: 0.7em;
            padding-right: 0.7em;
        }

        .header div {
            border: none;
            text-transform: uppercase;
            font-family: Arial, Helvetica, sans-serif;
            transition: all 0.35s ease;
        }
        .header div:hover {
            text-shadow: 2px 2px 15px black;
        }

        .header div:nth-child(3) {
            margin-left: auto;
        }

    </Style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="Home"></div>
            <div class="Search"></div>
            <div class="log out"></div>
            <div>
        <div class="menu">Menu</div>
        <div class="main">Main</div>
        <div class="right">Right</div>
        <div class="footer">Footer</div>
    </div>
    
</body>
</html>
