<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#ecf2ff] md:flex md:items-center md:justify-center">
  <main class="w-full bg-white md:grid md:max-w-[736px] md:grid-cols-2 md:overflow-hidden md:rounded-[32px] md:shadow-[0_30px_60px_rgba(61,108,236,0.15)]">
    
    <section class="rounded-b-[32px] bg-gradient-to-b from-[#7857ff] to-[#2e2be9] px-[57px] pb-10 pt-6 text-center md:rounded-[32px] md:px-[54px] md:pb-[55px] md:pt-[38px]">
      <h1 class="text-lg font-bold text-[#cac9ff] md:text-2xl">
        Your Result
      </h1>

      <div class="mx-auto mt-6 flex h-[140px] w-[140px] flex-col items-center justify-center rounded-full bg-gradient-to-b from-[rgba(78,33,202,1)] to-[rgba(36,33,202,0)] md:mt-[35px] md:h-[200px] md:w-[200px]">
        <p class="text-[56px] font-extrabold leading-none text-white md:text-7xl">76</p>
        <p class="mt-1 text-base font-bold text-[#8b7dff]">of 100</p>
      </div>

      <h2 class="mt-6 text-2xl font-bold text-white md:mt-7 md:text-[32px]">
        Great
      </h2>

      <p class="mx-auto mt-2 max-w-[260px] text-base font-medium leading-[1.3] text-[#cac9ff] md:mt-[14px]">
        You scored higher than 65% of the people who have taken these tests.
      </p>
    </section>

    <section class="px-8 pb-[30px] pt-6 md:px-10 md:pb-[46px] md:pt-[38px]">
      <h2 class="text-lg font-bold text-[#303b5a] md:text-2xl">
        Summary
      </h2>

      <div class="mt-6 space-y-4 md:mt-7">
        <div class="flex items-center justify-between rounded-xl bg-[rgba(255,87,87,0.08)] px-4 py-[17px]">
          <div class="flex items-center gap-3">
            <img src="./assets/images/icon-reaction.svg" alt="Reaction icon">
            <span class="text-lg font-medium text-[#ff5757]">Reaction</span>
          </div>
          <p class="text-lg font-extrabold text-[#303b5a]">
            80 <span class="font-bold text-[rgba(48,59,90,0.5)]">/ 100</span>
          </p>
        </div>

        <div class="flex items-center justify-between rounded-xl bg-[rgba(255,176,31,0.08)] px-4 py-[17px]">
          <div class="flex items-center gap-3">
            <img src="./assets/images/icon-memory.svg" alt="Memory icon">
            <span class="text-lg font-medium text-[#ffb01f]">Memory</span>
          </div>
          <p class="text-lg font-extrabold text-[#303b5a]">
            92 <span class="font-bold text-[rgba(48,59,90,0.5)]">/ 100</span>
          </p>
        </div>

        <div class="flex items-center justify-between rounded-xl bg-[rgba(0,189,145,0.08)] px-4 py-[17px]">
          <div class="flex items-center gap-3">
            <img src="./assets/images/icon-verbal.svg" alt="Verbal icon">
            <span class="text-lg font-medium text-[#00bd91]">Verbal</span>
          </div>
          <p class="text-lg font-extrabold text-[#303b5a]">
            61 <span class="font-bold text-[rgba(48,59,90,0.5)]">/ 100</span>
          </p>
        </div>

        <div class="flex items-center justify-between rounded-xl bg-[rgba(17,37,214,0.08)] px-4 py-[17px]">
          <div class="flex items-center gap-3">
            <img src="./assets/images/icon-visual.svg" alt="Visual icon">
            <span class="text-lg font-medium text-[#1125d6]">Visual</span>
          </div>
          <p class="text-lg font-extrabold text-[#303b5a]">
            73 <span class="font-bold text-[rgba(48,59,90,0.5)]">/ 100</span>
          </p>
        </div>
      </div>

      <button class="mt-6 h-14 w-full rounded-full bg-[#303b5a] text-lg font-bold text-white hover:bg-gradient-to-b hover:from-[#7857ff] hover:to-[#2e2be9] md:mt-[41px]">
        Continue
      </button>
    </section>

  </main>
</body>
</html>
