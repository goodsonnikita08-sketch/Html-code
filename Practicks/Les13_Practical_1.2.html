<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
    <link rel="icon" href="../shared_resoursers/icons_practice/account.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;

            background-image: url("../shared_resoursers/Зал Крови.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;

            min-height: 100vh;
        }

        .contact-form-container {
            width: 820px;
            margin: 50px auto;
            padding: 30px;

            
            background-color: rgba(0, 0, 0, 0.35);

            border: 2px solid rgba(0, 0, 0, 0.5);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .contact-form-title {
            color: white;
            font-size: 22px;
            margin-bottom: 15px;
        }

        .contact-form-text {
            color: white;
            font-size: 12px;
            margin-bottom: 25px;
        }

        .contact-form-row {
            margin-bottom: 12px;
            font-size: 0;
        }

        .contact-form-label {
            display: inline-block;
            width: 140px;
            color: white;
            font-size: 14px;
            padding-top: 8px;
        }

        .contact-form-input {
            height: 34px;
            border: none;
            padding-left: 10px;
            font-size: 13px;

            
            background-color: rgba(255, 255, 255, 0.85);
        }

        .input-name {
            width: 200px;
            margin-right: 12px;
        }

        .input-last-name {
            width: 200px;
        }

        .input-email {
            width: 412px;
        }

        .input-phone {
            width: 110px;
            margin-right: 10px;
        }

        .input-phone-last {
            width: 150px;
        }

        .contact-form-select {
            width: 412px;
            height: 34px;
            border: none;
            padding-left: 10px;

            background-color: rgba(255, 255, 255, 0.85);
        }

        .contact-form-textarea {
            width: 412px;
            height: 90px;
            border: none;
            padding: 10px;
            resize: none;

            background-color: rgba(255, 255, 255, 0.85);
        }

        .contact-form-line {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            margin: 15px 0;
        }

        .submit-btn-container {
            text-align: right;
        }

        .submit-btn {
            width: 412px;
            height: 34px;

            background-color: transparent;
            border: 1px solid white;
            color: white;

            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="contact-form-container">
        <h1 class="contact-form-title">Contact form</h1>
        <p class="contact-form-text">Please fill in your information and we'll be sending your order.</p>

        <form>
            <div class="contact-form-row">
                <label class="contact-form-label">Your name</label>
                <input class="contact-form-input input-name" type="text" placeholder="first name">
                <input class="contact-form-input input-last-name" type="text" placeholder="last name">
            </div>

            <div class="contact-form-row">
                <label class="contact-form-label">Your email</label>
                <input class="contact-form-input input-email" type="email" placeholder="your_mail@mail.com">
            </div>

            <div class="contact-form-row">
                <label class="contact-form-label">Phone</label>
                <input class="contact-form-input input-phone" type="text" placeholder="000">
                <input class="contact-form-input input-phone" type="text" placeholder="000">
                <input class="contact-form-input input-phone-last" type="text" placeholder="0000">
            </div>

            <div class="contact-form-row">
                <label class="contact-form-label">Message subject</label>
                <select class="contact-form-select">
                    <option>Other</option>
                    <option>Question</option>
                    <option>Support</option>
                </select>
            </div>

            <div class="contact-form-row">
                <label class="contact-form-label">Message</label>
                <textarea class="contact-form-textarea"></textarea>
            </div>

            <hr class="contact-form-line">

            <div class="submit-btn-container">
                <button class="submit-btn">SUBMIT FORM</button>
            </div>
        </form>
    </div>

</body>

</html>
