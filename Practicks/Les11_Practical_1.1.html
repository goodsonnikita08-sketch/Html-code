<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video777</title>
    <style>
        body {
            background-color: #6b58ade7;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .upload {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ccc;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        img {
            width: 15em;
            height: 10em;
        }

        .info {
            flex: 1;
            margin: 0 20px;
        }

        .progress-text {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .progress-bar {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bar {
            flex: 1;
            height: 20px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .fill {
            width: 40%;
            height: 100%;
            background: #4caf50;
        }

        .progress-bar button {
            background: #11447a;
            color: #fff;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
        }

        .time {
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .upload {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .info {
                margin: 15px 0;
            }

            .progress-bar {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .progress-bar button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="upload">
        <img src="../shared_resoursers/loading.png" alt="loading icon">
        <div class="info">
            <p class="progress-text">UPLOADING 40%</p>
            <div class="progress-bar">
                <div class="bar">
                    <div class="fill"></div>
                </div>
                <button>DONE</button>
            </div>
            <p class="time">About 23 minutes remaining</p>
            <h3>Title of video</h3>
            <p class="note">HEY HEY HEY!!! YOU!!! YEAH, YOU, [KID]!! DO YOU [WANT] TO BE A [BIG SHOT]???!! THEN DOWNLOAD
                THIS VIDEO RIGHT [[pipis]]-ING NOW!!!! IT'S [FREE], I SWEAR!!!!</p>
        </div>
    </div>
</body>

</html>
