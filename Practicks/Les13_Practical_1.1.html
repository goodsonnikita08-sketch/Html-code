<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login</title>
    <link rel="icon" href="../shared_resoursers/icons_practice/Account.png">
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            background-color: #111;
            font-family: Arial, Helvetica, sans-serif;
            color: #fff;
        }

        .login-form-container{
            width: 380px;
            margin: 62px auto 0 auto;
            text-align: center;
        }

        .login-form{
            width: 100%;
            background-color: #222;
            padding: 58px 34px 22px 34px;
            border: 2px solid #ff2e91;
        }

        .account-icon-container{
            width: 56px;
            height: 56px;
            background-color: #111;
            border: 2px solid #ff2e91;
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
        }

        .account-icon{
            width: 100%;
            height: 100%;
            display: block;
        }

        .login-form-title{
            font-size: 22px;
            font-weight: 700;
            color: #ff2e91;
            margin-bottom: 22px;
        }

        .login-input{
            width: 100%;
            height: 34px;
            display: block;
            border: 2px solid #ff2e91;
            background-color: #111;
            margin-bottom: 12px;
            text-align: center;
            font-size: 14px;
            color: #fff;
        }

        .login-btn{
            width: 100%;
            height: 36px;
            display: block;
            border: none;
            background-color: #ff2e91;
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 14px;
        }

        .forgot-password-link{
            display: block;
            text-decoration: none;
            color: #ff2e91;
            font-size: 12px;
            font-weight: 700;
        }

        .social-login-text{
            color: #fff;
            font-size: 15px;
            margin-top: 18px;
            margin-bottom: 14px;
        }

        .social-buttons-container{
            width: 100%;
            text-align: center;
            font-size: 0;
        }

        .social-login-link{
            width: 120px;
            height: 34px;
            line-height: 34px;
            display: inline-block;
            text-decoration: none;
            color: white;
            font-size: 12px;
            border: 2px solid #ff2e91;
            background-color: #111;
            margin: 0 6px;
        }

        .social-icon{
            width: 14px;
            height: 14px;
            vertical-align: middle;
            margin-right: 8px;
        }

        .social-text{
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="login-form-container">
        <form class="login-form" action="/login" method="post">
            <div class="account-icon-container">
                <img class="account-icon" src="../shared_resoursers/icons_practice/Account.png" alt="account icon">
            </div>

            <h1 class="login-form-title">Member Login</h1>

            <input class="login-input" type="text" name="username" placeholder="Username">
            <input class="login-input" type="password" name="password" placeholder="Password">

            <button class="login-btn" type="submit">Login</button>

            <a class="forgot-password-link" href="#">Forgot password?</a>
        </form>

        <p class="social-login-text">... or login with:</p>

        <div class="social-buttons-container">
            <a class="social-login-link" href="#">
                <img class="social-icon" src="../shared_resoursers/icons_practice/Facebok logo.png" alt="facebook icon">
                <span class="social-text">Facebook</span>
            </a>

            <a class="social-login-link" href="#">
                <img class="social-icon" src="../shared_resoursers/icons_practice/Twitter logo.png" alt="twitter icon">
                <span class="social-text">Twitter</span>
            </a>
        </div>
    </div>
</body>
</html>
